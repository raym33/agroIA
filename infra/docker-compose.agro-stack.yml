services:
  postgres_timeseries:
    image: timescale/timescaledb-ha:pg18
    container_name: agro_postgres_timeseries
    restart: unless-stopped
    environment:
      POSTGRES_DB: agriculture
      POSTGRES_USER: agriculture
      POSTGRES_PASSWORD: agriculture_dev_password
      PGDATA: /home/postgres/pgdata/data
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
      - agro_pgdata:/home/postgres/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agriculture -d agriculture"]
      interval: 10s
      timeout: 5s
      retries: 8

  adminer:
    image: adminer:5
    container_name: agro_adminer
    restart: unless-stopped
    ports:
      - "127.0.0.1:8088:8080"
    depends_on:
      postgres_timeseries:
        condition: service_healthy

volumes:
  agro_pgdata:
